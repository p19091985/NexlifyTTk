[database]
# ======================================================================
# INSTRUÇÕES:
# Para usar um banco de dados, descomente a seção correspondente
# e comente as outras. Apenas UMA seção pode estar ativa.
# ======================================================================

# --- Configuração para SQLite (Padrão) ---
# Não requer instalação de servidor. O banco será um arquivo 'sistema.db'
# criado na pasta raiz do projeto.
type = sqlite
path = sistema.db


# --- Configuração para SQL Server ---
# Requer um servidor SQL Server rodando e o driver pymssql.
# Instale com: pip install pymssql
#
# type = mssql
# host = SEU_SERVIDOR_IP_OU_NOME
# port = 1433
# dbname = CONTROLE_DE_USUARIOS
# user = seu_usuario
# password = sua_senha
